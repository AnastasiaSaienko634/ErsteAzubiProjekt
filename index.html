<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✏️ Azubihilfe | KI-Bot</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="">
    <div class="content-container">
        <header class="header-container">
            <h1 class="header-title"> Azubihilfe</h1>
            <p class="header-description">Dein KI-Lernassistent für Programmierung</p>
        </header>
        <div class="chat-window">
            <div class="pages-container">
                <button class="nav-btn active" data-page="lehrer">👨‍🏫 Lehrer</button>
                <button class="nav-btn" data-page="aufgaben">💻 Aufgaben</button>
                <button class="nav-btn" data-page="code-helfer">🔎 Code-Helfer</button>
                <button class="nav-btn" data-page="bibliotek">📚 Bibliotek</button>
                <!-- <button class="settings">⚙️</button> -->
            </div>
            <div class="chat">
                <div class="ki-container">
                    <div class="ki-logo">
                        <p id="current-logo">👨‍🏫</p>
                    </div>
                    <div class="ki-status">
                        <p>Lehrer-Assistent <span>- Bereit</span></p>
                    </div>
                </div>
            </div>
            <div class="message-field">
                <div class="message-field-content" id="dynamic-content"></div>
            </div>

            <!-- ------------input + button------------ -->
            <div class="message-input-field">
                <input class="message-input" type="text"
                    placeholder="Schreib etwas... (Enter = Senden, Schift + Enter = Neue Zeile)">
                <button class="senden-button"><img
                        src="./images/2849794-airplane-interface-multimedia-paper-airplane-plane-send_107999.svg"
                        alt="Senden Icon">
                </button>
            </div>
        </div>
        <footer class="footer-container">
            <p>Azubihilfe v1 - Powered by Mistral AI via Make.com</p>
            <button id="theme-switch">
                <img src="./images/wb_sunny_24dp_E3E3E3_FILL1_wght400_GRAD0_opsz24.svg" alt="light-mode">
                <img src="./images/planet_24dp_E3E3E3_FILL1_wght400_GRAD0_opsz24.svg" alt="cosmos-mode">
                <img src="./images/dark_mode_24dp_E3E3E3_FILL1_wght400_GRAD0_opsz24.svg" alt="dark-mode">
            </button>
        </footer>
    </div>
    <script src="script.js"></script>
</body>

</html>
