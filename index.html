<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✏️ Azubihilfe | KI-Bot</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="">
    <div class="content-container">
        <header class="header-container">
            <h1 class="header-title"> Azubihilfe</h1>
            <p class="header-description">Dein KI-Lernassistent für Programmierung</p>
        </header>
        <div class="chat-window">
            <!-- Pages Switcher -->
            <div class="pages-container">
                <button class="nav-btn active" data-page="teacher">👨‍🏫 Lehrer</button>
                <button class="nav-btn" data-page="tasks">💻 Aufgaben</button>
                <button class="nav-btn" data-page="code-helper">🔎 Code-Helfer</button>
                <button class="nav-btn" data-page="library">📚 Bibliotek</button>
                <button class="settings">⚙️</button>
            </div>
            <div class="chat">
                <div class="ai-container">
                    <div class="ai-logo">
                        <p id="current-logo">👨‍🏫</p>
                    </div>
                    <div class="ai-status">
                        <p>Lehrer-Assistent <span>- Bereit</span></p>
                    </div>
                </div>
            </div>
            <div class="message-field">
                <div class="message-field-content" id="dynamic-content"></div>
            </div>

            <!-- ------------ Message Field | Input + Button ------------ -->
            <div class="message-input-field">
                <input class="message-input" type="text"
                    placeholder="Schreib etwas... (Enter = Senden, Schift + Enter = Neue Zeile)">
                <button class="send-button"><img
                        src="./images/2849794-airplane-interface-multimedia-paper-airplane-plane-send_107999.svg"
                        alt="Senden Icon">
                </button>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer-container">
            <p>Azubihilfe v1 - Powered by Mistral AI via Make.com</p>

        </footer>
    </div>
    <!-- Modal Window -->
    <div class="modal">
        <div class="modal-container">
            <span class="close-modal-btn">
                <img class="icon-close" src="./images/close-modal.svg" alt="close-modal"></span>
            <h1 class="modal-title">Settings Menu</h1>
            <div class="settings-content-container">
                <!-- Themes Switcher -->
                <h2 class="sett-content-title">Theme wechseln</h2>
                <button id="theme-switch">
                    <img src="./images/wb_sunny_24dp_E3E3E3_FILL1_wght400_GRAD0_opsz24.svg" alt="light-mode">
                    <img src="./images/planet_24dp_E3E3E3_FILL1_wght400_GRAD0_opsz24.svg" alt="cosmos-mode">
                    <img src="./images/dark_mode_24dp_E3E3E3_FILL1_wght400_GRAD0_opsz24.svg" alt="dark-mode">
                </button>
            </div>
            <div class="settings-content-container">
                <h2 class="sett-content-title">Chat leeren</h2>
                <button id="chat-delete">
                    <img src="./images/delete_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" alt="delete chat history">
                </button>
            </div>
            <div class="delete-info">
                <p>Wenn Sie auf „Chat leeren“ klicken, wird nur der aktuelle Tab geleert (zum Beispiel: Lehrer).</p>
            </div>
        </div>
    </div>
    <!-- JS -->
    <script src="script.js"></script>
    <script src="modal.js"></script>
    <script src="askAI-webhook.js"></script>
</body>

</html>
